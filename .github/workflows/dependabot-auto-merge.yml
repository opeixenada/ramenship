name: Dependabot Auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Pages after merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr=${{ github.event.pull_request.number }}
          repo="${{ github.repository }}"
          for _ in $(seq 1 180); do
            state=$(gh pr view "$pr" --repo "$repo" --json state -q .state)
            if [ "$state" = "MERGED" ]; then
              gh api --method POST "repos/$repo/dispatches" -f event_type='dependabot-pages-deploy'
              exit 0
            fi
            if [ "$state" = "CLOSED" ]; then
              echo "PR closed without merging; skipping Pages deploy."
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for merge; skipping Pages deploy."
          exit 0
